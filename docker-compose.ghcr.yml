# Docker Compose for Dokploy / Production
# Pulls pre-built image from GHCR
# 
# Setup:
#   1. Copy .env.example → .env
#   2. Fill in your S3_ACCESS_KEY and S3_SECRET_KEY
#   3. Deploy

version: "3.9"

services:
  moccipult:
    image: ghcr.io/fmnlpro/moccipult:latest
    container_name: moccipult
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - moccipult-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  moccipult-data:
    driver: local
