name: Build & Push GHCR

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build Docker image & push to GHCR
  # ──────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/moccipult
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./patch-server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup GHCR versions (keep latest only)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner
            const packageName = "moccipult"
            const packageType = "container"

            async function listVersions() {
              try {
                const versions = await github.paginate(
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                  { username: owner, package_type: packageType, package_name: packageName, per_page: 100 }
                )
                return { scope: "user", versions }
              } catch (error) {
                if (error.status !== 404) throw error
                const versions = await github.paginate(
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
                  { org: owner, package_type: packageType, package_name: packageName, per_page: 100 }
                )
                return { scope: "org", versions }
              }
            }

            async function deleteVersion(scope, id) {
              if (scope === "user") {
                await github.rest.packages.deletePackageVersionForUser({
                  username: owner, package_type: packageType, package_name: packageName, package_version_id: id
                })
                return
              }
              await github.rest.packages.deletePackageVersionForOrg({
                org: owner, package_type: packageType, package_name: packageName, package_version_id: id
              })
            }

            const { scope, versions } = await listVersions()
            core.info(`Found ${versions.length} GHCR versions in ${owner}/${packageName}`)

            const keepIds = new Set(
              versions
                .filter((v) => (v.metadata?.container?.tags || []).includes("latest"))
                .map((v) => v.id)
            )

            if (keepIds.size === 0) {
              core.warning("No version tagged latest found yet. Skipping cleanup.")
              return
            }

            for (const v of versions.filter((v) => {
              const tags = v.metadata?.container?.tags || []
              return tags.length > 0 && !tags.includes("latest")
            })) {
              const tags = v.metadata?.container?.tags || []
              core.info(`Deleting version ${v.id} tags=[${tags.join(",")}]`)
              await deleteVersion(scope, v.id)
            }

            core.info(`Kept version IDs: ${Array.from(keepIds).join(", ")}`)

  # ──────────────────────────────────────────────
  # Job 2: Auto-create git tag
  # ──────────────────────────────────────────────
  auto-tag:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: prev-tag
        run: |
          git fetch --tags
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest tag: ${LATEST:-none}"

      - name: Generate new version
        id: version
        run: |
          PREV="${{ steps.prev-tag.outputs.tag }}"
          if [ -z "$PREV" ]; then
            NEW_VERSION="v1.0.0"
          else
            NUM="${PREV#v}"
            MAJOR=$(echo "$NUM" | cut -d. -f1)
            MINOR=$(echo "$NUM" | cut -d. -f2)
            PATCH=$(echo "$NUM" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, bumping patch again"
            NUM="${TAG#v}"
            MAJOR=$(echo "$NUM" | cut -d. -f1)
            MINOR=$(echo "$NUM" | cut -d. -f2)
            PATCH=$(echo "$NUM" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW="v${MAJOR}.${MINOR}.${PATCH}"
            echo "version=$NEW" >> $GITHUB_OUTPUT
          else
            echo "version=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.check.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG — build #${{ github.run_number }}"
          git push origin "$TAG"
          echo "✅ Created tag: $TAG"

      - name: Save version for next job
        id: output
        run: echo "version=${{ steps.check.outputs.version }}" >> $GITHUB_OUTPUT

    outputs:
      version: ${{ steps.check.outputs.version }}

  # ──────────────────────────────────────────────
  # Job 3: Build CLI binaries (all platforms)
  # ──────────────────────────────────────────────
  build-cli:
    needs: auto-tag
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: node18-win-x64
            output: moccipult-windows.exe
            artifact: moccipult-windows
          - os: ubuntu-latest
            target: node18-linux-x64
            output: moccipult-linux
            artifact: moccipult-linux
          - os: macos-latest
            target: node18-macos-x64
            output: moccipult-macos
            artifact: moccipult-macos
          - os: macos-latest
            target: node18-macos-arm64
            output: moccipult-macos-arm
            artifact: moccipult-macos-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: cli
        run: npm install

      - name: Build binary
        working-directory: cli
        run: npx pkg . --targets ${{ matrix.target }} --output dist/${{ matrix.output }} --compress GZip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/dist/${{ matrix.output }}
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Job 4: Create GitHub Release
  # ──────────────────────────────────────────────
  release:
    needs: [auto-tag, build-cli]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: moccipult-*
          merge-multiple: true

      - name: List files
        run: find dist -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.version }}
          name: "Moccipult ${{ needs.auto-tag.outputs.version }}"
          body: |
            ## 🚀 Moccipult ${{ needs.auto-tag.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 | `moccipult-windows.exe` |
            | Linux x64 | `moccipult-linux` |
            | macOS x64 | `moccipult-macos` |
            | macOS ARM | `moccipult-macos-arm` |

            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/moccipult:${{ needs.auto-tag.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/moccipult:latest
            ```

            ### Quick Start
            ```bash
            moccipult config server https://your-server.com
            moccipult init
            moccipult patches upload -r <RELEASE_ID> -f patch.bin
            ```
          files: |
            dist/moccipult-windows.exe
            dist/moccipult-linux
            dist/moccipult-macos
            dist/moccipult-macos-arm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
