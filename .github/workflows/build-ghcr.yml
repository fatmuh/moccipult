name: Build & Push GHCR

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build Docker image & push to GHCR
  # ──────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/moccipult
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./patch-server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup GHCR versions (keep latest only)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner
            const packageName = "moccipult"
            const packageType = "container"

            async function listVersions() {
              try {
                const versions = await github.paginate(
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                  {
                    username: owner,
                    package_type: packageType,
                    package_name: packageName,
                    per_page: 100,
                  }
                )
                return { scope: "user", versions }
              } catch (error) {
                if (error.status !== 404) throw error
                const versions = await github.paginate(
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
                  {
                    org: owner,
                    package_type: packageType,
                    package_name: packageName,
                    per_page: 100,
                  }
                )
                return { scope: "org", versions }
              }
            }

            async function deleteVersion(scope, id) {
              if (scope === "user") {
                await github.rest.packages.deletePackageVersionForUser({
                  username: owner,
                  package_type: packageType,
                  package_name: packageName,
                  package_version_id: id,
                })
                return
              }

              await github.rest.packages.deletePackageVersionForOrg({
                org: owner,
                package_type: packageType,
                package_name: packageName,
                package_version_id: id,
              })
            }

            const { scope, versions } = await listVersions()
            core.info(`Found ${versions.length} GHCR versions in ${owner}/${packageName}`)

            const keepIds = new Set(
              versions
                .filter((version) => (version.metadata?.container?.tags || []).includes("latest"))
                .map((version) => version.id)
            )

            if (keepIds.size === 0) {
              core.warning("No version tagged latest found yet. Skipping cleanup to avoid deleting valid manifests.")
              return
            }

            const deletable = versions.filter((version) => {
              const tags = version.metadata?.container?.tags || []
              return tags.length > 0 && !tags.includes("latest")
            })

            for (const version of deletable) {
              const tags = version.metadata?.container?.tags || []
              core.info(`Deleting version ${version.id} tags=[${tags.join(",")}]`)
              await deleteVersion(scope, version.id)
            }

            core.info(`Kept version IDs: ${Array.from(keepIds).join(", ")}`)

  # ──────────────────────────────────────────────
  # Job 2: Auto-create git tag
  # ──────────────────────────────────────────────
  auto-tag:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: prev-tag
        run: |
          git fetch --tags
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest tag: ${LATEST:-none}"

      - name: Generate new version
        id: version
        run: |
          PREV="${{ steps.prev-tag.outputs.tag }}"
          
          if [ -z "$PREV" ]; then
            # No tags yet, start from v1.0.0
            NEW_VERSION="v1.0.0"
          else
            # Strip 'v' prefix
            NUM="${PREV#v}"
            
            # Parse major.minor.patch
            MAJOR=$(echo "$NUM" | cut -d. -f1)
            MINOR=$(echo "$NUM" | cut -d. -f2)
            PATCH=$(echo "$NUM" | cut -d. -f3)
            
            # Auto bump patch
            PATCH=$((PATCH + 1))
            
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }} already exists, bumping patch again"
            
            # Tag exists, bump patch once more
            PREV="${{ steps.version.outputs.version }}"
            NUM="${PREV#v}"
            MAJOR=$(echo "$NUM" | cut -d. -f1)
            MINOR=$(echo "$NUM" | cut -d. -f2)
            PATCH=$(echo "$NUM" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW="v${MAJOR}.${MINOR}.${PATCH}"
            echo "version=$NEW" >> $GITHUB_OUTPUT
            echo "Adjusted version: $NEW"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        run: |
          TAG="${{ steps.check.outputs.version || steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG — build #${{ github.run_number }}"
          git push origin "$TAG"
          echo "✅ Created tag: $TAG"
