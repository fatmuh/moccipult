name: moccipult
description: Self-hosted code push client for Flutter apps. Check and download patches from your own Moccipult server.
version: 1.0.0
homepage: https://github.com/fatmuh/moccipult

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.0
  crypto: ^3.0.3
  package_info_plus: ^5.0.0
  shared_preferences: ^2.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
