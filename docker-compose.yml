version: "3.9"

services:
  patch-server:
    build:
      context: ./patch-server
      dockerfile: Dockerfile
    container_name: moccipult-patch-server
    ports:
      - "3000:3000"
    env_file:
      - ./patch-server/.env
    volumes:
      - patch-server-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  patch-server-data:
    driver: local
