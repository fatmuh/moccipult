version: "3.9"

services:
  patch-server:
    build:
      context: ./patch-server
      dockerfile: Dockerfile
    container_name: moccipult-patch-server
    ports:
      - "3000:3000"
    volumes:
      - patch-server-data:/app/data
      - patch-server-storage:/app/patches-storage
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - DB_PATH=/app/data/patches.db
      # ── Storage ──
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_PATH=/app/patches-storage
      - SERVER_URL=${SERVER_URL:-http://localhost:3000}
      # ── S3 (uncomment if STORAGE_TYPE=s3) ──
      # - S3_ENDPOINT=https://s3.amazonaws.com
      # - S3_REGION=us-east-1
      # - S3_BUCKET=moccipult-patches
      # - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      # - S3_SECRET_KEY=${S3_SECRET_KEY}
      # - S3_PUBLIC_URL=https://moccipult-patches.s3.amazonaws.com
      # - S3_PREFIX=patches
      # ── Auth ──
      - API_KEY=${API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  patch-server-data:
    driver: local
  patch-server-storage:
    driver: local
